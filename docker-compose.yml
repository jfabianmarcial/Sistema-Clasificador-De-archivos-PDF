version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node1
      - node2
      - node3
    restart: always

  node1:
    build: ./server
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/docuflow?replicaSet=rs0
      - JWT_SECRET=mi_secreto_super_seguro
      - NODE_ID=nodo-1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: always

  node2:
    build: ./server
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/docuflow?replicaSet=rs0
      - JWT_SECRET=mi_secreto_super_seguro
      - NODE_ID=nodo-2
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: always

  node3:
    build: ./server
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/docuflow?replicaSet=rs0
      - JWT_SECRET=mi_secreto_super_seguro
      - NODE_ID=nodo-3
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: always

  mongo1:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    restart: always

  mongo2:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    restart: always

  mongo3:
    image: mongo:7
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    restart: always

  mongo-init:
    image: mongo:7
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: "no"
    command: >
      mongosh --host mongo1:27017 --eval '
        rs.initiate({
          _id: "rs0",
          members: [
            { _id: 0, host: "mongo1:27017" },
            { _id: 1, host: "mongo2:27017" },
            { _id: 2, host: "mongo3:27017" }
          ]
        })
      '

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  uploads_data: